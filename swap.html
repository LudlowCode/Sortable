<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>JS Bin</title>
	<link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css" />
	<style>
		body {
			font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
			font-size: larger;
		}

		.list-group {
			display: flex;
			/* Aligns children side-by-side */
			gap: 20px;
			/* Creates space between items */
			padding: 10px;
		}

		.list-group-item {
			background-color: lightblue;
			border-radius: 15px;
			/* Rounds the corners */
			padding: 20px;
			flex: 1;
			/* Makes them share space equally */
			text-align: center;
			user-select: none;
		}

		.highlight {
			background-color: #f9c7c8 !important;
			font-weight: bold;
		}

		.sortable-chosen {
			background-color: #d1ff87af !important;
			font-weight: bold;
		}
	</style>
	<style>
	</style>
	<script src="./Sortable.js"></script>

	<script type="text/javascript" src="st/prettify/prettify.js"></script>
	<script type="text/javascript" src="st/prettify/run_prettify.js"></script>
	<script src="st/app.js"></script>
	<!-- <script src="Sortable.js"></script> -->
	<script>
		function setup() {
			Sortable.create(list, {
				swap: true,
				swapClass: "highlight",
				selectedClass: "selected",
				animation: 150
			});
			Sortable.create(list2, {
				swap: true,
				swapClass: "highlight",
				selectedClass: "selected",
				animation: 150
			});
		}
		/**
		 * @param {Event} ev The event that caused this  
		 */
		function dragging(ev) {
			console.log(ev.target);
		}    
	</script>
</head>

<body onload="setup()">

	<div id="list" class="list-group">
		<div class="list-group-item" onmousedown="dragging(event)">Item 1</div>
		<div class="list-group-item">Item 2</div>
		<div class="list-group-item">Item 3</div>
		<div class="list-group-item">Item 4</div>
		<div class="list-group-item">Item 5</div>
	</div>

	<div id="list2" class="list-group">
		<div class="list-group-item">3</div>
		<div class="list-group-item">2</div>
		<div class="list-group-item">5</div>
		<div class="list-group-item">7</div>
		<div class="list-group-item">0</div>
	</div>




</body>

</html>
